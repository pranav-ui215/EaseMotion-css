<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Command Palette</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="palette">

<div class="search">

<span>🔍</span>

<input
type="text"
placeholder="Search commands..."
readonly>

</div>

<div class="commands">

<div class="item">

<span>Open Dashboard</span>

<kbd>Ctrl+D</kbd>

</div>

<div class="item">

<span>Create Project</span>

<kbd>Ctrl+N</kbd>

</div>

<div class="item">

<span>Deploy Application</span>

<kbd>Ctrl+Shift+D</kbd>

</div>

<div class="item">

<span>Settings</span>

<kbd>Ctrl+,</kbd>

</div>

</div>

</div>

</body>
</html>
